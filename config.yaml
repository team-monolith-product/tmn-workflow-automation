deployment_rotation:
  channel_id: "C02VA2LLXH9"
  members:
    - "U02JLCWGETT"  # 배영빈
    - "U07RP7U3FPU"  # 박기영
    - "U02PFUPCJNM"  # 류호선
  fixed_days: 3  # 월화수 고정 (members 순서대로), 나머지 요일만 로테이션

scheduled_jobs:
  - name: validate_customer_reports
    module: scripts.validate_customer_reports
    function: main
    cron:
      hour: 8
      minute: 0
      day_of_week: mon-fri
    business_day_only: true

  - name: manage_tasks_daily
    module: scripts.manage_tasks_daily
    function: main
    cron:
      hour: 8
      minute: 15
      day_of_week: mon-fri
    business_day_only: true

  - name: notify_upcoming_workevent
    module: scripts.notify_upcoming_workevent
    function: main
    cron:
      hour: 8
      minute: 30
      day_of_week: mon-fri
    business_day_only: true

  - name: notify_worktime_left
    module: scripts.notify_worktime_left
    function: main
    cron:
      hour: 8
      minute: 45
      day_of_week: mon-fri
    business_day_only: true

  - name: collect_review_stats
    module: scripts.collect_review_stats
    function: main
    cron:
      hour: 9
      minute: 0
      day_of_week: mon-fri
    business_day_only: false

  - name: collect_coding_rule_feedbacks
    module: scripts.collect_coding_rule_feedbacks
    function: main
    cron:
      hour: 9
      minute: 15
      day_of_week: mon
    business_day_only: false

  - name: post_scrum_intro
    module: scripts.post_scrum_intro
    function: main
    cron:
      hour: 9
      minute: 0
      day_of_week: mon-fri
    business_day_only: true

  - name: post_scrum_message
    module: scripts.post_scrum_message
    function: main
    cron:
      hour: 16
      minute: 0
      day_of_week: mon-fri
    business_day_only: true

  - name: summarize_deployment
    module: app.summarize_deployment
    function: summarize_deployment
    cron:
      hour: 16
      minute: 30
      day_of_week: mon-fri
    business_day_only: true

  - name: schedule_scrum_mention
    module: scripts.schedule_scrum_mention
    function: main
    cron:
      hour: 16
      minute: 30
      day_of_week: mon-fri
    business_day_only: true

  - name: notify_typeform_no_communication
    module: scripts.notify_typeform_no_communication
    function: main
    cron:
      hour: 9
      minute: 0
      day_of_week: mon-fri
    business_day_only: true

  - name: announce_deployment_rotation
    module: scripts.announce_deployment_rotation
    function: main
    cron:
      hour: 9
      minute: 0
      day: 1
    business_day_only: false

  - name: discord_post_completion_notice
    module: scripts.discord_post_completion_notice
    function: main
    cron:
      minute: "*/10"
    business_day_only: false

  - name: crawl_education_bids
    module: scripts.crawl_education_bids
    function: main
    cron:
      hour: 9
      minute: 20            # 9시대 타 작업(00·15분)과 겹치지 않게
    # 주말·공휴일 포함 매일 실행. 새 공고 없으면 Slack 전송은 자동 생략됨.

# 나라장터(G2B) 교육 외주 입찰공고 수집·평가
# - DATA_GO_KR_BID_KEY 환경변수 필요 (입찰공고정보서비스 활용신청 후 발급, 클러스터 시크릿)
# - 역량·자격·전략·점수정책 등 변동 지식은 knowledge/edu_bid/*.yaml 에서 관리
# - 조회 구간은 '어제 같은 시각 ~ 현재'를 무상태로 계산(stages.build_incremental_window)
education_bid_crawler:
  channel_id: "C0B7CQ19DS6"    # 슬랙 t_제품_공공입찰
  model: "gpt-5.2"
  batch_size: 20               # LLM 1회 호출당 평가 공고 수
  kinds:                       # 조회할 업무구분 (servc=용역, thng=물품, cnstwk=공사, frgcpt=외자)
    - servc
