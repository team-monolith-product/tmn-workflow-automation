# 점수·결정 정책 — 콘텐츠 제작 트랙 (지식 레이어)
# 담당 사업유형: 콘텐츠 (디지털 학습콘텐츠·교재·이러닝·영상 제작)
# S5(심층평가) 프롬프트와 S6(결정) 임계에 주입된다. 사업 단계가 바뀌면 갱신한다.
# 주의: 가중치·임계는 우선 구축/개발과 동일하게 두었다. 팀 기준이 정해지면 이 파일만 조정.
version: 1
updated: 2026-06-02

# 핵심·보조 전략 — desc 가 S5 프롬프트에 그대로 주입된다.
strategy:
  primary:
    desc: >
      우리 콘텐츠 저작도구(다형 활동 빌더)·블록코딩(엔트리/스크래치/메이크코드)·
      코딩 실습형 콘텐츠·데이터리터러시 자산으로 저렴하게 만들 수 있는
      디지털 학습콘텐츠·교재·이러닝 콘텐츠 제작 건을 최우선으로 한다.
  secondary:
    desc: >
      SW·AI·코딩·디지털교과서처럼 우리 도메인과 직결돼 기존 콘텐츠·활동을 재사용·
      변형할 수 있는 건은 가점한다. 반대로 도메인 무관한 단순 영상·홍보물·인쇄물
      제작이나 외부 저작권/촬영 비중이 큰 건은 재사용률을 낮게 본다.

# 체급 sweet spot — 콘텐츠 제작은 구축 대비 단가가 낮아 하단을 낮춘다.
ticket_size:
  sweet_low: 30000000
  sweet_high: 500000000

# 낙찰방식 stance — S5 프롬프트에 주입.
award_method_stance:
  협상에의한계약: prefer
  제한경쟁: prefer
  적격심사: conditional_on_reuse
  최저가: conditional_on_reuse

# 4축 가중치 (S6 종합점수)
weights:
  reuse: 0.35
  winnability: 0.35
  value: 0.15
  performance_building: 0.15

# 결정 임계 (0~100 종합점수)
thresholds:
  recommend: 70
  review: 50
