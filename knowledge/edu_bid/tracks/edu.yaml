# 점수·결정 정책 — 교육/연수 트랙 (지식 레이어)
# 담당 사업유형: 교육운영, 행사 (위탁운영·캠프·부트캠프·연수·경진대회)
# S5(심층평가) 프롬프트와 S6(결정) 임계에 주입된다. 사업 단계가 바뀌면 갱신한다.
# 주의: 가중치·임계는 우선 구축/개발과 동일하게 두었다. 팀 기준이 정해지면 이 파일만 조정.
version: 1
updated: 2026-06-02

# 핵심·보조 전략 — desc 가 S5 프롬프트에 그대로 주입된다.
strategy:
  primary:
    desc: >
      코딩·AI·SW 교육 위탁운영·캠프·부트캠프·연수·경진대회 중, 우리 클라우드 코딩
      실습환경·온라인저지·자동채점·AI 튜터·LMS(학급/대시보드)를 운영 플랫폼으로
      재사용해 원가우위를 만들 수 있는 건을 최우선으로 한다.
  secondary:
    desc: >
      교육운영은 오프라인 강의·멘토·상주인력 비중이 크면 우리 SW 자산만으로
      원가우위를 만들기 어렵다. 플랫폼 기여도(실습/채점/학습관리)가 분명한 건과
      직접 용역계약으로 정량 실적금액 적립 가치가 큰 건에 한해 가점한다.

# 체급 sweet spot (5천만~10억) — S5 프롬프트에 주입.
ticket_size:
  sweet_low: 50000000
  sweet_high: 1000000000

# 낙찰방식 stance — S5 프롬프트에 주입.
award_method_stance:
  협상에의한계약: prefer
  제한경쟁: prefer
  적격심사: conditional_on_reuse
  최저가: conditional_on_reuse

# 4축 가중치 (S6 종합점수)
weights:
  reuse: 0.35
  winnability: 0.35
  value: 0.15
  performance_building: 0.15

# 결정 임계 (0~100 종합점수)
thresholds:
  recommend: 70
  review: 50
