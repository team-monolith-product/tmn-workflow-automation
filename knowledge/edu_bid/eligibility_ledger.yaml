#     perf_usable: uncertain        # 계약서 문구·세금계산서 품목·실적증명서 발급여부로 결정
#     evidence_todo: [계약서 과업문구, 세금계산서 품목명, 발행사 수행실적증명서, SW산업협회 수행실적확인]

# ── 확정 대기 단서 (코드/배포 정황 → 확인 후 performance 로 이관) ──
