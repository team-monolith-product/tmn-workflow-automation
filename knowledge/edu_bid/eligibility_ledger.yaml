# 팀모노리스 자격·실적 원장 (지식 레이어, append-only)
# 하드 게이트(S2)의 근거이자, 수주할 때마다 실적이 쌓이는 살아있는 원장.
# - S8(결과원장)이 수주 건을 performance 에 append 하면 다음부터 더 많은 게이트가 열린다.
# - 실적은 "있다/없다"가 아니라 계약 성격으로 종류가 갈린다. contract_type 으로 분류 기록.
version: 2
updated: 2026-05-30

# 참가 불가(하드 게이트 fail) 낙찰방식 — 계약대상자가 이미 정해진 정보공개용 공고.
# award_method 에 아래 문자열이 포함되면 평가 전에 제외한다(substring 매칭).
# "수의시담" 은 "다자간수의시담" 도 포함한다. 소액수의견적(견적경쟁)은 참가 가능하므로 제외 안 함.
excluded_award_methods:
  - 수의시담

credentials:
  sw_business_report: true        # 소프트웨어사업자 신고 (보유)
  region: 서울특별시               # 본사 소재지 (지역제한 게이트용)

  # 나라장터 업종등록 (입찰 참가자격 업종). 업종제한 공고에서 우리 보유 업종이면 통과.
  # 주목: 학술.연구용역(1169)·행사대행업(9901) 보유 → 연구·행사 공고도 참가 자격 있음.
  industry_registrations:
    - { name: 소프트웨어사업자(컴퓨터…), code: "1468", reg_no: B25-315211 }   # 원문 업종명 일부 잘림
    - { name: 소프트웨어사업자(디지털…), code: "1469", reg_no: 제B25-315211-0… }
    - { name: 학술.연구용역, code: "1169" }
    - { name: 기타자유업(행사대행업), code: "9901" }
    - { name: 기타자유업종, code: "9999" }

  # 중소기업자간 경쟁 직접생산확인 — 보유 세부품명 + 물품분류번호 + 유효기간(종료일).
  # 이 품명의 중기간경쟁 공고는 직접생산 게이트 통과. 만료 이후 계약기간이면 갱신 필요.
  direct_production:
    - { name: 정보시스템개발서비스, code: "8111159901", expires: 2027-08-24 }
    - { name: 정보시스템유지관리서비스, code: "8111189901", expires: 2027-08-24 }
    - { name: 소프트웨어유지및지원서비스, code: "8111229901", expires: 2027-08-24 }
    - { name: 인터넷지원개발서비스, code: "8111219901", expires: 2027-08-24 }
    - { name: 패키지소프트웨어개발및도입서비스, code: "8111159801", expires: 2027-08-24 }
    - { name: 기타행사기획및대행서비스, code: "8014199001", expires: 2027-03-18 }

  # 가점·필수 인증 (적격심사 정량점수 / 일부 공고 참가요건)
  certifications:
    - name: CSAP             # 클라우드보안인증
      held: true
      expires: 2026-10       # 갱신 필요 — 계약기간이 만료 이후면 게이트 주의/플래그
    - name: 기업부설연구소
      held: true
    - name: 벤처기업확인
      held: true

# 실적 원장: 수주·수행 건을 한 줄씩 추가 (append-only).
# 분류는 세금계산서가 아니라 "계약 실질(계약서 과업)"이 정한다. RS(수익배분) 같은
# 대가 지급방식은 분류를 바꾸지 않지만, 정량 실적금액 산정을 약하게 만든다.
# → 한 건의 가치를 둘로 나눠 기록한다:
#   reference_strength : 기술 레퍼런스(정성) 강도 (협상계약 기술평가·제안서용)
#   perf_amount        : 정량 실적금액으로 증명 가능한 금액 (실적제한·적격심사용)
#   perf_usable        : 그 금액을 실적요건에 쓸 수 있는지 (yes|uncertain|no)
# TODO: 실제 계약 건만 기입(임의 생성 금지).
#   contract_type: 구축개발 | 구축개발(RS) | 운영 | 유지관리 | SW공급이용
# 회사 전체 실적 — S2 게이트의 near_miss 판정(실적제한경쟁 + 실적 약함)에 쓰인다(법인 단위).
performance: []

# 트랙별 정량 실적 — S5 평가 프롬프트의 '정량 실적 상태' 근거(팀별로 쌓이는 실적금액).
# 구조만 두고 비워둔다. 실제 계약 건은 각 팀이 아래 예시 형식으로 채운다(임의 생성 금지).
# 키는 config.yaml education_bid_crawler.tracks 의 key 와 일치(dev/content/edu).
track_performance:
  dev: []
  content: []
  edu: []

# 예시 형식 (performance·track_performance 공통):
# performance:
