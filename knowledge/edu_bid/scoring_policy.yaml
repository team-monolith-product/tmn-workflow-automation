# 점수·결정 정책 (지식 레이어)
# 전략 가중치. 사업 단계가 바뀌면 갱신한다.
# - S5(심층평가) 프롬프트 가중, S6(결정) 임계에 사용.
version: 1
updated: 2026-05-30

# 체급 sweet spot: 5천만~10억 (소형+중형). 이 밖은 감점.
ticket_size:
  min: 50000000          # 이 미만은 수익성 약 → 감점
  sweet_low: 50000000
  sweet_high: 1000000000 # 10억 초과는 대기업·대형SI 경쟁 → 감점

# 낙찰방식 stance: 재사용률이 높으면 가격경쟁에서도 이길 수 있으므로 적격심사도 조건부 참여.
award_method_stance:
  협상에의한계약: prefer            # 기술평가 중심 = 우리 무대
  제한경쟁: prefer
  적격심사: conditional_on_reuse    # 재사용률 높을수록 가격경쟁력으로 참여
  최저가: conditional_on_reuse

# 가중치: 균형(EV × 전략가치). 재사용률은 공통 1급 신호.
weights:
  reuse: 0.35                # 재사용률(효율·마진)
  winnability: 0.30          # 수주가능성(낙찰방식·경쟁·재공고·기관친숙도)
  value: 0.20               # 사업가치(체급·LTV)
  performance_building: 0.15 # 실적 적립 가치(현 실적 약점 보강 투자) — 실적 충분해지면 ↓

# 결정 임계 (0~100 종합점수 기준)
thresholds:
  recommend: 70    # 입찰추천
  review: 50       # 검토
  future_target: 0 # 그 미만 + near-miss 게이트면 미래타깃

# 실적요건 near-miss: 요건의 이 비율 이상이면 fail 대신 '미래타깃'으로 추적
near_miss_ratio: 0.7
