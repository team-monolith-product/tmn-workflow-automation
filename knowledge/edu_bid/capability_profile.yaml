# 2026-05-30: 조직 전체 레포(team-monolith-product 100+) 직접 조사로 근거 기반 작성.
# 각 자산의 maturity/edu_bid_relevance/evidence 는 실제 소스·커밋·배포 구성 확인 결과.
# - S3(트리아지) 키워드 매핑, S5(심층평가) 재사용률 판정의 기준선.
# - 자산이 늘거나 성숙도가 바뀌면 갱신. maturity: production | beta | poc | research
# - tracks: 이 자산이 어느 입찰 트랙의 재사용 근거가 되는지(dev=구축/개발, content=콘텐츠 제작,
#   edu=교육/연수). S5 평가 프롬프트는 해당 트랙 태그가 붙은 자산만 본다(트리아지는 전체 사용).
