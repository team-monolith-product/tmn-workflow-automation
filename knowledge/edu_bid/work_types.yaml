# 사업유형(work_type) 분류 규칙 (지식 레이어)
# 조달 품목분류(소/중/대) + 제목 키워드로 사업유형을 태깅한다.
# 판정 순서: order 순서대로, 각 유형에서 (title 키워드 우선 → proc 분류명) 매칭.
# 우리 재사용률은 사업유형이 크게 가름: 개발/구축 高, 운영·콘텐츠 中, 연구·무관 0.
version: 1
updated: 2026-05-30

order: [개발, 유지관리, 콘텐츠, 교육운영, 행사, 연구, 무관]

rules:
  개발:        # 외주개발·구축·고도화 (재사용 최고)
    title: [구축, 개발, 고도화, 플랫폼, 시스템]
    proc: [정보시스템개발서비스, SW 및 시스템 개발, 패키지소프트웨어, 인터넷지원개발, 응용소프트웨어개발]
  유지관리:    # 운영·유지보수
    title: [유지관리, 유지보수]
    proc: [정보시스템유지관리서비스, 소프트웨어유지및지원서비스, 운영 및 유지관리]
  콘텐츠:      # 콘텐츠·매체 제작
    title: [콘텐츠, 교재, 디지털교과서, 영상 제작, 이러닝 콘텐츠]
    proc: [동영상제작서비스, 매체제작, 콘텐츠제작]
  교육운영:    # 교육 위탁운영·연수
    title: [위탁운영, 교육운영, 교육과정 운영, 부트캠프, 아카데미, 양성, 캠프, 연수, 직무교육]
    proc: [기타교육서비스, 교육서비스, 교육 및 전문직종]
  행사:        # 행사 기획·대행 (경진대회 등)
    title: [경진대회, 공모전, 해커톤, 박람회, 페스티벌, 행사]
    proc: [기타행사기획및대행서비스, 행사 기획 및 대행]
  연구:        # 연구·조사 용역
    title: [종단연구, 실태조사, 연구용역]
    proc: [연구조사서비스, 학술연구서비스, 기타연구조사]
  무관:        # 우리와 무관 (재사용 0)
    title: []
    proc: [폐기물, 여행, 설계, 감리, 청소, 시설물관리, 안전진단, 렌트, 운송, 보험, 숙박]

default: 기타

# 평가 전 제외할 사업유형(LLM 비용 절감). 보수적으로 명백 무관만.
drop_for_eval: [무관]
